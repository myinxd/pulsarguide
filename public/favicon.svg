<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Pulsar line with lane markings -->
  <polyline
    points="12,90 28,90 36,78 46,56 58,100 70,46 82,94 92,58 104,90 116,90"
    fill="none"
    stroke="url(#g)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Lane dashes -->
  <line x1="12" y1="110" x2="116" y2="110" stroke="#4a5568" stroke-width="3" stroke-dasharray="6,4"/>
  <!-- Antenna -->
  <circle cx="64" cy="18" r="6" fill="#06b6d4"/>
  <line x1="64" y1="24" x2="64" y2="40" stroke="#06b6d4" stroke-width="2.5"/>
  <!-- Pulsar rings -->
  <circle cx="64" cy="18" r="10" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.5"/>
  <circle cx="64" cy="18" r="14" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
</svg>
